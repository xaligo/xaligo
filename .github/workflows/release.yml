name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3 — without leading v)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the tag
      packages: write   # needed to publish to GitHub Packages

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "Invalid version: ${{ inputs.version }}. Must be X.Y.Z"; exit 1; }

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ryo-arima'

      - name: Install Go dependencies
        run: go mod tidy

      - name: Build WASM
        run: make build-wasm

      - name: Bump version in external/package.json
        run: npm --prefix external version "${{ inputs.version }}" --no-git-tag-version

      - name: Install npm dependencies
        run: npm --prefix external install

      - name: Build TypeScript package
        run: npm --prefix external run build

      - name: Build Ubuntu package image
        run: docker build -f docker/ubuntu.Dockerfile -t xaligo-package-ubuntu .

      - name: Build Debian package
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e VERSION="${{ inputs.version }}" \
            xaligo-package-ubuntu \
            scripts/build/build-deb.sh

      - name: Build Rocky package image
        run: docker build -f docker/rocky.Dockerfile -t xaligo-package-rocky .

      - name: Build RPM package
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e VERSION="${{ inputs.version }}" \
            xaligo-package-rocky \
            scripts/build/build-rpm.sh

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: xaligo-linux-packages-${{ inputs.version }}
          path: |
            output/packages/*.deb
            output/packages/*.rpm
          if-no-files-found: error

      - name: Commit version bump
        run: |
          git add external/package.json
          git commit -m "chore: release v${{ inputs.version }}"

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin HEAD --follow-tags

      - name: Publish to GitHub Packages
        run: npm --prefix external publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
